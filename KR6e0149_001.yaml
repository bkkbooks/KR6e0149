body:
  text: 今欲發心洗滌罪垢加功用行證入妙境要對十方一切賢聖今為證盟雖諸佛聖賢無所不在若不虔請對而不現故須依智離識常作佛想心清智明理隨事變即常見佛名淨緣起為請佛也故此經云譬如日出普照世間於一切淨水器中影無不現佛日亦爾普現法界無前無後一切衆生淨心器中佛無不現以我所修功德力無盡三寶攝受力法界自性緣起力祕密呪印威神力同共發願五濁末世後五百歲鬬諍時中及我法界衆生海為欲清淨帝網重重種種煩惱障業障見障報障等今應燒香散華一心正念口稱諸佛菩薩名字一一啓請衆等不得輕慢散亂第一會香華請一心奉請大方廣佛華嚴經中華藏世界海第一法界菩提場中真應交徹一多自在無盡身雲十身無礙本尊毗盧遮那如來十佛剎微塵數道場一切海衆惟願不捨慈悲降臨道場受我供養惟願下衆和後同香華請一心奉請大方廣佛華嚴經中舉果勸樂生信分法門惟願文文契意句句冥心顯現道場受我供養香華請一心奉請菩提場內菩提樹中俱時出現一切菩薩摩訶薩又宮殿內無邊菩薩摩訶薩及師子座中衆妙寶華輪臺基陛凡諸物像所有莊嚴悉皆顯現一一佛剎微塵數道場一切海衆惟願不捨慈悲降臨道場受我供養香華請一心奉請又此界中一一世主及華藏剎海中一一剎內所有世主又如此華藏世界十方法界盡虗空界一切剎海皆亦如是一切世主惟願不捨慈悲降臨道場受我供養香花請一心奉請華藏世界外十方無盡法界剎海內如是等億佛剎微塵數諸佛道場一切海衆惟願不捨慈悲降臨道場受我供養香花請一心奉請如來白毫相中剎海微塵數一切菩薩摩訶薩又十方各一億世界剎海微塵數一切菩薩摩訶薩惟願不捨慈悲降臨道場受我供養香花請一心奉請此世界中菩提道場初成正覺依正二報佛果會主普賢菩薩摩訶薩又十方法界盡虗空界微塵剎土中一切菩薩摩訶薩惟願不捨慈悲降臨道場受我供養香花請一心奉請華藏世界十不可說佛剎微塵數香水海中各有十不可說佛剎微塵數世界種一一世界種各有十不可說佛剎微塵數諸佛道場一切海衆惟願不捨慈悲降臨道場受我供養香花請一心奉請普門淨光明世界海勝因世界最初劫中一切功德山須彌勝雲佛波羅蜜善眼莊嚴王佛最勝功德海佛名稱普聞蓮華眼幢佛等十須彌極微塵數諸佛道場一切海衆惟願不捨慈悲降臨道場受我供養香花請一心奉請普門淨光世界最初劫中圓器上根一生滿多劫果大威光太子等百萬億伴繞王子一切海衆惟願不捨慈悲降臨道場受我供養第二會香花請一心奉請大方廣佛華嚴經中華藏世界海第二法界普光明殿重重無盡法界身雲毗盧遮那如來十剎微塵數道場一切海衆惟願不捨慈悲降臨道場受我供養香花請一心奉請普遍法界一切名號佛剎又十方各過十剎微塵數世界之外十首菩薩本界佛名不動智佛等十剎微塵數道場一切海衆惟願不捨慈悲降臨道場受我供養香花請一心奉請大方廣佛華嚴經中該攝果海十信法門惟願文文契意句句冥心顯現道場受我供養香花請一心奉請十信會主文殊師利等十首菩薩摩訶薩又十方法界重重無盡一切十信菩薩摩訶薩惟願不捨慈悲降臨道場受我供養第三會香花請一心奉請大方廣佛華嚴經中華藏世界海第三法界忉利天宮重重無盡法界身雲毗盧遮那如來十剎微塵數道場一切海衆惟願不捨慈悲降臨道場受我供養香花請一心奉請十方各過百佛剎微塵數國土外諸世界中十慧菩薩本界佛名殊特月佛等十佛剎微塵數道場一切海衆又十方各過千佛剎微塵數世界外各有千佛剎微塵數一切加持佛同名法慧佛又十方各過萬佛剎微塵數世界外各有十佛剎微塵數證法菩薩本界佛同名一切妙法如來又十方各過十佛剎微塵數世界外各有十佛剎微塵數一切證法佛同名法慧佛惟願不捨慈悲降臨道場受我供養香花請一心奉請大方廣佛華嚴經中初賢十住覺滿自在法門惟願文文契意句句冥心顯現道場受我供養香花請一心奉請十住會主法慧等十慧菩薩摩訶薩又十方各過萬佛剎微塵數世界外各有十佛剎微塵數一切法慧菩薩摩訶薩又十方法界重重無盡一切十住菩薩摩訶薩惟願不捨慈悲降臨道場受我供養第四會香花請一心奉請大方廣佛華嚴經中華藏世界海第四法界夜摩天宮重重無盡法界身雲毗盧遮那如來十剎微塵數道場一切海衆惟願不捨慈悲降臨道場受我供養香花請一心奉請十方各過十萬佛剎微塵數國土外諸世界中十林菩薩本界佛名常住眼佛等十佛剎微塵數道場一切海衆又十方各過萬佛剎微塵數世界外有萬佛剎微塵數一切加持佛同名功德林佛又十方各過十萬佛剎微塵數世界外有十萬佛剎微塵數一切證法同名普功德佛惟願不捨慈悲降臨道場受我供養香花請一心奉請大方廣佛華嚴經中普賢十行無盡深廣法門惟願文文契意句句冥心顯現道場受我供養香花請一心奉請十行會主功德林等十林菩薩摩訶薩一切海衆又十方各過十萬佛剎微塵數世界外有十萬佛剎微塵數證法一切功德林菩薩摩訶薩又十方法界重重無盡一切十信菩薩摩訶薩惟願不捨慈悲降臨道場受我供養第五會香花請一心奉請大方廣佛華嚴經中華藏世界海第五法界兜率陀天重重無盡法界身雲毗盧遮那如來十剎微塵數道場一切海衆惟願不捨慈悲降臨道場受我供養香花請一心奉請十方各過萬佛剎微塵數國土外諸世界中十幢菩薩本界佛名無盡幢佛等萬佛剎微塵數道場一切海衆又十方各過十萬佛剎微塵數世界外各有十萬佛剎微塵數一切加持佛