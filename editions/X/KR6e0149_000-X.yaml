front:
  text: 華嚴懺法序華嚴之為經王也夫人而知之矣肇于晉廣于唐於是有實叉難陀之譯有清涼國師之疏鈔有季長者之合論有杜順和尚之法界觀千年以來薄海內外頂禮捧誦者無慮萬億而華嚴懺獨後出其製之者曰唐一行其藏之者日鷄足山其尊信而流通之者今麗江郡世守木君也難者曰懺之為言悔也悔者五十一心數中之一法耳華嚴經者稱性而談該心之變而道之者也有經可以無懺有經而必有懺則何異儒家之以五緯配五經乎一疑也一行之學精於天官曆數載在唐書甚詳不聞其留意於教典也即留意教典豈無奇文奧義可以垂世立教而屑屑於稱名號勤禮拜之為務乎二疑也古之藏書名山者皆慮譏切當時危言賈禍今製懺禮佛何嫌何忌而近舍珠林遠栖荒服紙帛之力不能千年劫火滄桑何以完好如故三疑也解之者曰子之所疑皆世間法耳非所論於出世法也華嚴之義帝網重重須彌芥子互相容納安在經之可以該懺而懺之不可以該經乎恒人之學可以詳略精麤論也若一行者天台祝流水西行雒下讖聖人復出逆流現身博綜象數豈非華嚴十地中人固難以凡心測量豈其詳於星曆而略於宗教從口所出即為真詮安在經論之精而懺文之麤乎佛法從因緣生興廢顯晦皆有時節懺之製於一行而傳付於普瑞成於唐而出於明撰于龍首而藏於鷄足悶於葉榆崇聖而顯於木君皆有數存乎其間無可疑者此而可疑則華嚴之出於龍宮傳於于闐亦可疑矣地越蘭滄星分鉞爟藏弆於深山古寺固已深於禹穴而神於唐多矣聖典所在諸天護持不離紙帛可使堅如金石又何散佚腐敗之足虞乎聖天子聖輪御世崇信大乘方以華嚴法界含攝羣生而木君表章懺法實維其時時節因緣如寶羅網交光攝入惟天眼佛眼為能知之木君世篤忠貞釐南服濟世潤生一本華嚴行門先刻是經演疏翻印三藏總持宣布浩如煙海今復流通懺文與流鈔合論竝傳震旦佛法付囑國王大臣豈不信哉是經不可思議懺亦不可思議木君之尊信流通其因果亦不可思議聚沙居士見作隨喜遂盥手授筆而為之序崇禎十四年歲在辛巳禮部右侍郎恊理詹事府事兼翰林院侍讀學士虞山錢謙益齋沐謹序華嚴經海印道場懺儀敘毗盧性海本無識浪之奔騰中道義天何有業雲之障翳慨自無始元明一炤生所遂爾有情熏染五住難空于是大覺世尊悲心無齊張施教網撈摝群機欲使糟粕聲緣稻麻佛子皆据涅槃之岸咸登寂滅之場此如來不動不離而升而游之弘願也固知言說盡屬筌蹄本懷欲明心性夫眾生流浪罪有攸歸頓滅塵沙計當安出灸病必求其穴斫樹須討夫根善逝既為與藥之醫王必授破魔之鎧仗知執情著我先淘汰以般若之波閔我所迷人復攝歸于因陀之網五時三炤無非解脫之門七處九會總為懺悔之法迦文所以思惟三七光召十方與雲籠大士說此華藏玄文也夫何事說經旨歸斷惑則是經外無懺懺即是經豈屬分鑣固為合轍但今習行三昧者既闇正助之兼資建立道場者復昧事理之互說惟修相福不飾心壇遂使懺法雖多悟道實尠不有善軌何以修持若舍佛華難凋罪果予故謂法運之興當機在此廼躬逢聖明正盛弘方廣而跡淹草莽亦甚有奇緣十年發願初鐫刻以告成萬里來人復賷持而下訊問其方所則云來自天末滇南叩以指麾則云主于木公無姤啟函而讀知為雜華之懺儀依經而錄乃是一行之撰述其為式也分布四十二晌表證位于前阿後茶題云海印道場明取則于發光影現依普賢之十願該龍藏之全文正救世之津梁爍昏之如意也祕于古剎何歷兵火而猶存出自今朝固知因緣之有在生白木公者雪山香象麗水珠王棄榮堪揖龐公檀波洋溢傳經可方龍猛教海翻騰是以沙劫良因一朝奇滙鳳苞雖愆謀面久屬知心乃不棄荒愚俾參得失寄懷金帛欲梓流傳猗歟盛哉天邪人也予方悵群經之有懺獨華嚴而無聞豈意千載先有同心不覺一時爭為合掌遂以百萬雄文促其半載竣業法流寰宇版貯江南將使入此門者燒香散華即識二音之相貌低頭舉手咸植千佛之遠因善財之烟水百城何須徧訪彌勒之莊嚴樓閣彈指忽開頓悟本成無煩塵劫何有于山河大地總是法身不礙夫芥子須彌融于妙性重重塵剎掌果宛然浩浩天人鍼鋒徧現此皆尅期證入豈屬侈語誇人果爾則尚有何法以當前何罪而可滅耶始知四十九年之說已屬不如不是何況四十二晌之儀猶為可著可取是今日優曇之現正為脫後之果成茲方梨棗之傳亦為住前之筏喻予檮昧無知罕窺祕奧當茲盛事勉爾濡毫紀勝云耳辨冊豈敢旹崇禎十有四年歲在辛巳孟夏浴佛日虞山佛弟子毛鳳苞薰沐頓首謹序華嚴海印道場懺儀題辭伏聞道原不藉夫言而非言無以暢其道者契經也理雖不舍夫事而即事可以攝其理者三昧也葢由契經而出三昧是從顯以入微由三昧而成懺法是兼本以及末此豈非因果不昧之宗修行漸次之路乎殆自海影印周於東土而雜華散落於人間專袒習者勤讀誦之紛紜飭伽譚者爭搜探之先後自爾龍經匝地香軸彌天寫素呾纜於井光現卒賭波於冰照誠運隆金水之盛歲徵牂豨之符者也但其綫義貴乎貫穿算沙秪為觀察尚未知金外更無師子又烏識乳外必無醍醐於是賢首出焉擬天台行坐非半之四禪造妄盡還源之三觀更考古華嚴中有佛名二卷菩薩名一卷載錄增多略無遺漏廼肇斯懺之張本也茲華嚴三昧儀者厥興於大唐蘭山雲巖寺一行沙門遵十重之願而為華嚴依三寶之章而啟歸敬倣草堂道場之式而立四十二晌之行布次第焉前前則配以勸樂生信後後則合以依人證入中間敘列可知彼葢欲扶在纏之迷倒裂報障之大網耳逮歷乎宋又得載光寺普瑞沙門述而補注之然皆撰自支那未充梵夾手抄筆錄湮沒千秋況兵燹屢經而獲久存者殆一奇矣暨乎我明滇中麗江生白木大士輒遇於葉榆之崇聖寺機因跡顯道賴人弘真法界之玄鏡重輝高山之慧日再朗也忽於庚辰之端月星使軺車懷金萬里爰來虞山問詢汲古主人因命較閱繡刻流通一大因緣不可思議愚也方且眊然而眎瞶然而聽瞿瞿然互為短長而與之更始遂授之梓人以告成焉客有從東方來者瞪目而讓愚曰子胡昧夫大不思議經之旨趣也子將以華嚴為懺乎抑以懺為華嚴乎子不見夫天中天者毗盧遮那也世界海者華藏塵剎也身而非身所以說徧一切處境而非境所以指當前一法無我矣又無我所所以超乎般若而純譚解脫法門此時而何處容一罪福相又何處著一懺悔相乎甚矣子之不智也愚曰噫吾過矣吾過矣雖然遣蕩為破執情建立為除斷見文殊之答思惟梵天曰一切言說皆是真實何以故諸有言說皆是如來言說不出如故又於不思議佛境界經曰一切凡夫起貪瞋癡處即是如來所住平等法葢貪瞋癡起於言說故從言說得出離耳由是諦觀不妨從華嚴中出
